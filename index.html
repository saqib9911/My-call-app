<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro Max</title>
    <meta name="theme-color" content="#075e54">
    <link rel="manifest" href="data:application/manifest+json,{'name':'WhatsAppPro','short_name':'WAPro','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#075e54','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/124/124034.png','sizes':'512x512','type':'image/png'}]}">
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        :root { --green: #075e54; --light-green: #25d366; --bg: #e5ddd5; --my-msg: #dcf8c6; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #111; overflow: hidden; }
        
        #app { max-width: 500px; margin: 0 auto; background: var(--white); height: 100%; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* Header & Tabs */
        header { background: var(--green); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
        .nav-tabs { background: var(--green); display: flex; color: rgba(255,255,255,0.7); text-align: center; font-size: 14px; font-weight: bold; }
        .tab { flex: 1; padding: 15px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        /* Pages */
        .page { flex: 1; overflow-y: auto; display: none; background: white; }
        .page.active { display: block; }

        /* List Items (Chats/Contacts) */
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; }
        .avatar { width: 50px; height: 50px; background: #128c7e; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        .info { flex: 1; }
        .info b { display: block; font-size: 16px; }
        .info small { color: #666; font-size: 13px; }

        /* Chat Window Overlay */
        #chat-window { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        #chat-window.open { left: 0; }
        .chat-head { background: var(--green); color: white; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .bubble { margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: var(--my-msg); border-top-right-radius: 0; }
        .them { align-self: flex-start; background: var(--white); border-top-left-radius: 0; }

        /* Chat Footer */
        .chat-foot { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 8px; }
        .chat-foot input { flex: 1; border: none; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 15px; }
        .action-btn { background: var(--green); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        /* Floating Button */
        .fab { position: absolute; bottom: 25px; right: 25px; background: var(--light-green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; cursor: pointer; z-index: 500; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <span>WhatsApp Pro</span>
        <div style="display:flex; gap:15px; font-size: 18px;"><span>🔍</span><span>⋮</span></div>
    </header>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('chats', this)">CHATS</div>
        <div class="tab" onclick="switchTab('status', this)">STATUS</div>
        <div class="tab" onclick="switchTab('calls', this)">CALLS</div>
    </div>

    <div id="chats-page" class="page active">
        <div id="contact-list"></div>
    </div>

    <div id="status-page" class="page">
        <div class="item">
            <div class="avatar" style="background:#ccc">+</div>
            <div class="info"><b>My Status</b><small>Tap to add update</small></div>
        </div>
    </div>

    <div id="calls-page" class="page">
        <p style="text-align: center; color: #888; margin-top: 50px;">No recent calls.</p>
    </div>

    <button class="fab" onclick="addNewFriend()">💬</button>

    <div id="chat-window">
        <div class="chat-head">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <div class="avatar" id="chat-avatar" style="width:38px; height:38px; font-size:16px;">?</div>
            <div style="flex:1"><b id="chat-title">Name</b><br><small>Online</small></div>
            <div style="display:flex; gap:20px; font-size: 18px;">
                <span onclick="startCall('voice')" style="cursor:pointer;">📞</span>
                <span onclick="startCall('video')" style="cursor:pointer;">📹</span>
            </div>
        </div>
        <div id="messages"></div>
        <div class="chat-foot">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button class="action-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<script>
    // --- INITIALIZATION ---
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const myNum = localStorage.getItem('my_wa_num') || prompt("Apna Phone Number enter karein (e.g. 0321...):");
    if(myNum) localStorage.setItem('my_wa_num', myNum);

    let activeRoomID = null;
    let friends = JSON.parse(localStorage.getItem('wa_friends') || '[]');

    // --- NAVIGATION ---
    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tab + '-page').classList.add('active');
        el.classList.add('active');
        if(tab === 'chats') renderFriends();
    }

    function renderFriends() {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        friends.forEach(f => {
            const div = document.createElement('div');
            div.className = 'item';
            div.onclick = () => openChat(f.name, f.num);
            div.innerHTML = `<div class="avatar">${f.name[0]}</div><div class="info"><b>${f.name}</b><small>${f.num}</small></div>`;
            list.appendChild(div);
        });
    }

    function addNewFriend() {
        const n = prompt("Dost ka Naam:");
        const p = prompt("Dost ka Number:");
        if(n && p) {
            friends.push({name: n, num: p});
            localStorage.setItem('wa_friends', JSON.stringify(friends));
            renderFriends();
        }
    }

    // --- MESSAGING ---
    function openChat(name, num) {
        activeRoomID = [myNum, num].sort().join('-');
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-avatar').innerText = name[0];
        document.getElementById('chat-window').classList.add('open');
        document.getElementById('messages').innerHTML = '';

        gun.get('room-' + activeRoomID).map().once((data) => {
            if(data && data.text) {
                const b = document.createElement('div');
                b.className = `bubble ${data.sender === myNum ? 'me' : 'them'}`;
                b.innerText = data.text;
                document.getElementById('messages').appendChild(b);
                const box = document.getElementById('messages');
                box.scrollTop = box.scrollHeight;
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim() && activeRoomID) {
            gun.get('room-' + activeRoomID).set({
                sender: myNum,
                text: inp.value,
                time: Date.now()
            });
            inp.value = '';
        }
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('open'); }

    // --- VIDEO CALLING (Free Resource) ---
    function startCall(type) {
        if(activeRoomID) {
            const callRoom = "WA-PRO-CALL-" + activeRoomID;
            const url = `https://meet.jit.si/${callRoom}`;
            window.open(url, '_blank');
        }
    }

    // --- PWA SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
        const sw = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`;
        const blob = new Blob([sw], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    renderFriends();
</script>

</body>
</html>
