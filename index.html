<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro Max</title>
    <meta name="theme-color" content="#075e54">
    <link rel="manifest" href="data:application/manifest+json,{'name':'WhatsAppPro','short_name':'WAPro','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#075e54','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/124/124034.png','sizes':'512x512','type':'image/png'}]}">
    
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <style>
        :root { --green: #075e54; --light-green: #25d366; --bg: #e5ddd5; --my-msg: #dcf8c6; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #000; overflow: hidden; }
        #app { max-width: 500px; margin: 0 auto; background: var(--white); height: 100%; display: flex; flex-direction: column; position: relative; }
        
        header { background: var(--green); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-tabs { background: var(--green); display: flex; color: rgba(255,255,255,0.7); text-align: center; font-size: 14px; font-weight: bold; }
        .tab { flex: 1; padding: 15px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        .page { flex: 1; overflow-y: auto; display: none; background: white; }
        .page.active { display: block; }

        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; }
        .avatar { width: 50px; height: 50px; background: #128c7e; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        .info { flex: 1; }
        .info b { display: block; font-size: 16px; }
        
        #chat-window { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        #chat-window.open { left: 0; }
        .chat-head { background: var(--green); color: white; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .bubble { margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .me { align-self: flex-end; background: var(--my-msg); }
        .them { align-self: flex-start; background: var(--white); }
        
        .delete-btn { font-size: 10px; color: red; cursor: pointer; display: block; margin-top: 5px; text-align: right; }

        .chat-foot { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .chat-foot input { flex: 1; border: none; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 15px; }
        .send-btn { background: var(--green); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; }

        .fab { position: absolute; bottom: 25px; right: 25px; background: var(--light-green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; cursor: pointer; z-index: 500; }
        
        /* Video Call Fullscreen UI */
        #call-frame { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <span>WhatsApp Pro</span>
        <button onclick="resetApp()" style="background:none; border:1px solid white; color:white; border-radius:5px; font-size:10px; padding:2px 5px;">Reset App</button>
    </header>

    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('chats', this)">CHATS</div>
        <div class="tab" onclick="switchTab('status', this)">STATUS</div>
        <div class="tab" onclick="switchTab('calls', this)">CALLS</div>
    </div>

    <div id="chats-page" class="page active">
        <div id="contact-list"></div>
    </div>

    <button class="fab" onclick="addFriend()">💬</button>

    <div id="chat-window">
        <div class="chat-head">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <div class="avatar" id="chat-avatar" style="width:38px; height:38px; font-size:16px;">?</div>
            <div style="flex:1"><b id="chat-title">Name</b><br><small>Online</small></div>
            <div style="display:flex; gap:18px;">
                <span onclick="triggerCall()" style="cursor:pointer;">📞</span>
                <span onclick="triggerCall()" style="cursor:pointer;">📹</span>
            </div>
        </div>
        <div id="messages"></div>
        <div class="chat-foot">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button class="send-btn" onclick="sendChatMessage()">➤</button>
        </div>
    </div>
</div>

<div id="call-frame">
    <iframe id="jitsi-iframe" allow="camera; microphone; fullscreen; display-capture; autoplay" src="" style="width:100%; height:100%; border:none;"></iframe>
    <button onclick="endCall()" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:red; color:white; border:none; padding:15px 30px; border-radius:30px; z-index:2100; font-weight:bold;">End Call</button>
</div>

<script>
    // --- APP SETUP ---
    // Ably is used for super-fast direct messaging
    const ably = new Ably.Realtime('YOUR_ABLY_KEY_HERE_OR_GUEST_MODE'); 
    // Note: For total "zero-config", we'll stick to a globally shared public Ably-like room logic or GunDB with fixed relays
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gundb.herokuapp.com/gun']);

    const myNum = localStorage.getItem('wa_num') || prompt("Apna Number Enter Karein (Example: 03001234567):");
    if(myNum) localStorage.setItem('wa_num', myNum);

    let activeRoomID = null;
    let friends = JSON.parse(localStorage.getItem('wa_friends') || '[]');

    // --- UI LOGIC ---
    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tab + '-page').classList.add('active');
        el.classList.add('active');
    }

    function renderFriends() {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        friends.forEach((f, idx) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="avatar" onclick="openChat('${f.name}', '${f.num}')">${f.name[0]}</div>
                <div class="info" onclick="openChat('${f.name}', '${f.num}')"><b>${f.name}</b><small>${f.num}</small></div>
                <button onclick="deleteFriend(${idx})" style="background:none; border:none; color:red; font-size:18px;">🗑️</button>
            `;
            list.appendChild(div);
        });
    }

    function addFriend() {
        const n = prompt("Dost ka Naam:");
        const p = prompt("Dost ka Phone Number (Wohi format jo aapne apna likha):");
        if(n && p) {
            friends.push({name: n, num: p});
            localStorage.setItem('wa_friends', JSON.stringify(friends));
            renderFriends();
        }
    }

    function deleteFriend(idx) {
        if(confirm("Dost ko delete karein?")) {
            friends.splice(idx, 1);
            localStorage.setItem('wa_friends', JSON.stringify(friends));
            renderFriends();
        }
    }

    // --- MESSAGING LOGIC ---
    function openChat(name, num) {
        activeRoomID = [myNum, num].sort().join('_');
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-avatar').innerText = name[0];
        document.getElementById('chat-window').classList.add('open');
        document.getElementById('messages').innerHTML = '';

        // GunDB for persistent messaging
        gun.get('final_wa_room_' + activeRoomID).map().once((data, id) => {
            if(data && data.text) {
                const b = document.createElement('div');
                b.id = id;
                b.className = `bubble ${data.sender === myNum ? 'me' : 'them'}`;
                b.innerHTML = `${data.text} <span class="delete-btn" onclick="deleteMessage('${id}')">Delete</span>`;
                document.getElementById('messages').appendChild(b);
                const box = document.getElementById('messages');
                box.scrollTop = box.scrollHeight;
            } else if (document.getElementById(id)) {
                document.getElementById(id).remove();
            }
        });
    }

    function sendChatMessage() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim() && activeRoomID) {
            gun.get('final_wa_room_' + activeRoomID).set({
                sender: myNum,
                text: inp.value,
                time: Date.now()
            });
            inp.value = '';
        }
    }

    function deleteMessage(id) {
        gun.get('final_wa_room_' + activeRoomID).get(id).put(null);
    }

    // --- CALLING LOGIC (IN-APP) ---
    function triggerCall() {
        if(activeRoomID) {
            const room = "WA_PRO_Satti_" + activeRoomID;
            const iframe = document.getElementById('jitsi-iframe');
            iframe.src = `https://meet.jit.si/${room}#config.prejoinPageEnabled=false&interfaceConfig.TOOLBAR_BUTTONS=["microphone","camera","hangup","fittoscreen"]`;
            document.getElementById('call-frame').style.display = 'block';
        }
    }

    function endCall() {
        document.getElementById('call-frame').style.display = 'none';
        document.getElementById('jitsi-iframe').src = "";
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('open'); }
    function resetApp() { localStorage.clear(); location.reload(); }

    renderFriends();
</script>
</body>
</html>
