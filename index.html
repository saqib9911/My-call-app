<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro Max</title>
    <meta name="theme-color" content="#075e54">
    <link rel="manifest" href="data:application/manifest+json,{'name':'WhatsAppPro','short_name':'WAPro','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#075e54','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/124/124034.png','sizes':'512x512','type':'image/png'}]}">
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    
    <style>
        :root { --green: #075e54; --light-green: #25d366; --bg: #e5ddd5; --my-msg: #dcf8c6; --white: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #000; overflow: hidden; }
        #app { max-width: 500px; margin: 0 auto; background: var(--white); height: 100%; display: flex; flex-direction: column; position: relative; }
        header { background: var(--green); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
        .nav-tabs { background: var(--green); display: flex; color: rgba(255,255,255,0.7); text-align: center; font-size: 14px; font-weight: bold; }
        .tab { flex: 1; padding: 15px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid white; }
        .page { flex: 1; overflow-y: auto; display: none; background: white; }
        .page.active { display: block; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; }
        .avatar { width: 50px; height: 50px; background: #128c7e; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        #chat-window { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        #chat-window.open { left: 0; }
        .chat-head { background: var(--green); color: white; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble { margin-bottom: 8px; padding: 10px; border-radius: 8px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.2); position: relative; }
        .me { align-self: flex-end; background: var(--my-msg); border-top-right-radius: 0; }
        .them { align-self: flex-start; background: var(--white); border-top-left-radius: 0; }
        .chat-foot { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .chat-foot input { flex: 1; border: none; padding: 12px; border-radius: 25px; outline: none; }
        .btn { background: var(--green); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .fab { position: absolute; bottom: 25px; right: 25px; background: var(--light-green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; border: none; cursor: pointer; z-index: 500; }
        
        /* Call Container */
        #call-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        #call-iframe { width: 100%; height: calc(100% - 60px); border: none; }
        .end-call-btn { width: 100%; height: 60px; background: red; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header><span>WhatsApp Pro</span></header>
    <div class="nav-tabs">
        <div class="tab active" onclick="switchTab('chats', this)">CHATS</div>
        <div class="tab">STATUS</div>
        <div class="tab">CALLS</div>
    </div>
    <div id="chats-page" class="page active"><div id="contact-list"></div></div>
    <button class="fab" onclick="addNewFriend()">💬</button>

    <div id="chat-window">
        <div class="chat-head">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px;">←</button>
            <div class="avatar" id="chat-avatar" style="width:35px; height:35px; font-size:14px;">?</div>
            <div style="flex:1"><b id="chat-title">Name</b></div>
            <div style="display:flex; gap:15px; font-size: 20px;">
                <span onclick="openInAppCall()">📞</span>
                <span onclick="openInAppCall()">📹</span>
            </div>
        </div>
        <div id="messages"></div>
        <div class="chat-foot">
            <button class="btn" onclick="alert('Voice Message Recording...')">🎤</button>
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button class="btn" onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<div id="call-overlay">
    <iframe id="call-iframe" allow="camera; microphone; fullscreen; display-capture; autoplay"></iframe>
    <button class="end-call-btn" onclick="closeCall()">END CALL</button>
</div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gundb.herokuapp.com/gun']);
    const myNum = localStorage.getItem('wa_num') || prompt("Apna Number likhein (Example: 0321...):");
    if(myNum) localStorage.setItem('wa_num', myNum);

    let activeRoomID = null;
    let friends = JSON.parse(localStorage.getItem('wa_friends') || '[]');

    function switchTab(t, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(t + '-page').classList.add('active');
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        el.classList.add('active');
    }

    function renderFriends() {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        friends.forEach((f, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="avatar" onclick="openChat('${f.name}', '${f.num}')">${f.name[0]}</div>
                <div class="info" onclick="openChat('${f.name}', '${f.num}')"><b>${f.name}</b><small>${f.num}</small></div>
                <button onclick="deleteFriend(${index})" style="background:none; border:none; color:red;">🗑️</button>
            `;
            list.appendChild(div);
        });
    }

    function addNewFriend() {
        const n = prompt("Dost ka Naam:");
        const p = prompt("Dost ka Number (Sahi format):");
        if(n && p) {
            friends.push({name: n, num: p});
            localStorage.setItem('wa_friends', JSON.stringify(friends));
            renderFriends();
        }
    }

    function deleteFriend(idx) {
        friends.splice(idx, 1);
        localStorage.setItem('wa_friends', JSON.stringify(friends));
        renderFriends();
    }

    function openChat(name, num) {
        activeRoomID = [myNum, num].sort().join('_');
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-avatar').innerText = name[0];
        document.getElementById('chat-window').classList.add('open');
        document.getElementById('messages').innerHTML = '';

        gun.get('room_v4_' + activeRoomID).map().on((data, id) => {
            if(data && data.text) {
                if(document.getElementById(id)) return;
                const b = document.createElement('div');
                b.id = id;
                b.className = `bubble ${data.sender === myNum ? 'me' : 'them'}`;
                b.innerText = data.text;
                document.getElementById('messages').appendChild(b);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(inp.value.trim() && activeRoomID) {
            gun.get('room_v4_' + activeRoomID).set({ sender: myNum, text: inp.value });
            inp.value = '';
        }
    }

    function openInAppCall() {
        if(!activeRoomID) return;
        const callUrl = `https://meet.jit.si/WA_PRO_V4_${activeRoomID}#config.prejoinPageEnabled=false&interfaceConfig.TOOLBAR_BUTTONS=["microphone","camera","hangup"]`;
        document.getElementById('call-iframe').src = callUrl;
        document.getElementById('call-overlay').style.display = 'block';
    }

    function closeCall() {
        document.getElementById('call-overlay').style.display = 'none';
        document.getElementById('call-iframe').src = '';
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('open'); }
    renderFriends();
</script>
</body>
</html>
